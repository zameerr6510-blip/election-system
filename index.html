<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>
/* ===== BODY + BACKGROUND IMAGE ===== */
body{
    font-family:Arial;
    text-align:center;
    margin:0;
    position:relative;
}

/* Background image with low opacity */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("https://www.mbacollegesbangalore.in/wp-content/uploads/2017/07/Karnataka-College-of-Management-Bangalore-Campus.png")
               no-repeat center center/cover;
    opacity:0.25;     /* adjust opacity */
    z-index:-1;
}

/* ===== HEADER ===== */
.header{
    background:#16a34a;
    padding:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    box-shadow:0 2px 5px #333;
}

.header img{
    height:60px;
}

.header h1{
    font-size:22px;
    margin:0;
    color:white;
}

/* ===== LOGIN BOX ===== */
.box{
    background:white;
    width:320px;
    margin:80px auto;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px #444;
}

input,button{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    background:#16a34a;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#12813a;
}
</style>

</head>

<body>

<!-- ===== HEADER WITH LOGO ===== -->
<div class="header">
    <img src="https://tse2.mm.bing.net/th/id/OIP.Ga1zNfIUY69gDyLHb8LQUwHaHd?rs=1&pid=ImgDetMain&o=7&rm=3" alt="College Logo">
    <h1>KARNATAKA COLLEGE OF MANAGEMENT AND SCIENCE</h1>
</div>

<h2>Online College Student Election System</h2>

<!-- ===== LOGIN FORM ===== -->
<div class="box">
<form onsubmit="return login()">
    <input type="text" id="name" placeholder="Student Name" required>
    <input type="text" id="reg" placeholder="Register Number" required>
    <button type="submit">Login</button>
</form>
</div>

<!-- ===== LOGIN SCRIPT ===== -->
<script>
function login(){
    let reg = document.getElementById("reg").value;

    if(localStorage.getItem("voted_" + reg)){
        alert("You have already voted!");
        return false;
    }

    localStorage.setItem("currentName", document.getElementById("name").value);
    localStorage.setItem("currentReg", reg);

    window.location.href = "rules.html";
    return false;
}
</script>

<!-- ===== ALREADY VOTED CHECK ===== -->
<script>
if(localStorage.getItem("voted_" + localStorage.getItem("currentReg"))){
    alert("You have already voted. You cannot vote again.");
    window.location.href = "voter_result.html";
}
</script>

</body>
</html>
