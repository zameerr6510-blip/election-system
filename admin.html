<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Results</title>
<style>
body{font-family:Arial;background:#f4f6f8;text-align:center;}
.box{background:#ffffff;width:85%;margin:30px auto;padding:20px;
border-radius:12px;}
table{margin:auto;border-collapse:collapse;width:80%;}
th,td{border:1px solid #888;padding:10px;}
th{background:#007bff;color:white;}
.win{color:green;font-weight:bold;}
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("https://www.mbacollegesbangalore.in/wp-content/uploads/2017/07/Karnataka-College-of-Management-Bangalore-Campus.png")
               no-repeat center center/cover;
    opacity:0.25;     /* adjust opacity */
    z-index:-1;
}

</style>
</head>

<body>

<div class="box">
<h2>🔒 Admin Election Results</h2>
<p><b>Total Voters:</b> <span id="total"></span></p>
</div>

<div class="box">
<table>
<tr><th>Post</th><th>Candidate</th><th>Votes</th></tr>
<tbody id="rows"></tbody>
</table>
</div>

<script>
let total=0;
for(let k in localStorage){
    if(k.startsWith("voted_")) total++;
}
document.getElementById("total").innerText=total;

function show(prefix,label){
    for(let k in localStorage){
        if(k.startsWith(prefix+"_")){
            let name=k.replace(prefix+"_","");
            let v=localStorage.getItem(k);
            let r=document.createElement("tr");
            r.innerHTML=`<td>${label}</td><td>${name}</td><td>${v}</td>`;
            document.getElementById("rows").appendChild(r);
        }
    }
}

show("president","President");
show("vice","Vice President");
show("cultural","Cultural Club");
show("sports","Sports Club");
show("tech","Technical Club");
show("nss","NSS Club");
</script>
<div class="box">
<h3>⚠ Reset Election</h3>
<button onclick="resetElection()" style="
padding:12px 30px;
background:red;
color:white;
border:none;
cursor:pointer;
">
Reset All Votes
</button>
</div>

<script>
function resetElection(){
    if(confirm("Are you sure you want to reset the election?")){
        localStorage.clear();
        alert("Election data reset successfully!");
        location.reload();
    }
}
</script>

</body>
</html>
