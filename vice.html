<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vice President Voting</title>

<style>
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("https://www.mbacollegesbangalore.in/wp-content/uploads/2017/07/Karnataka-College-of-Management-Bangalore-Campus.png")
               no-repeat center center/cover;
    opacity:0.25;     /* adjust opacity */
    z-index:-1;
}

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
}
.card{
    background:#fff;
    width:230px;
    margin:12px;
    padding:15px;
    display:inline-block;
    border-radius:12px;
    box-shadow:0 0 8px #aaa;
}
img{
    width:140px;
    height:140px;
    border-radius:50%;
}
.slogan{
    font-style:italic;
    color:#555;
}
button{
    padding:10px 30px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<h2>Vote for Vice President</h2>

<form onsubmit="return saveVicePresident()">

<div class="card">
    <img src="images/vp1.jpg">
    <h4>Amit Kumar</h4>
    <p>CSE – 3rd Year</p>
    <p class="slogan">"Support • Strength • Success"</p>
    <input type="radio" name="vice" value="Amit Kumar" required>
</div>

<div class="card">
    <img src="images/vp2.jpg">
    <h4>Sneha Das</h4>
    <p>EEE – 2nd Year</p>
    <p class="slogan">"Together We Grow"</p>
    <input type="radio" name="vice" value="Sneha Das">
</div>

<div class="card">
    <img src="images/vp3.jpg">
    <h4>Rohit Jain</h4>
    <p>Mechanical – 4th Year</p>
    <p class="slogan">"Action Over Words"</p>
    <input type="radio" name="vice" value="Rohit Jain">
</div>

<div class="card">
    <img src="images/vp4.jpg">
    <h4>Pooja Nair</h4>
    <p>ECE – 3rd Year</p>
    <p class="slogan">"Responsibility with Care"</p>
    <input type="radio" name="vice" value="Pooja Nair">
</div>

<br><br>
<button type="submit">Next</button>

</form>

<script>
function saveVicePresident() {

    // get selected vice president
    let vote = document.querySelector('input[name="vice"]:checked').value;

    // save voter's choice
    localStorage.setItem("vicePresident", vote);

    // count votes
    let key = "vice_" + vote;
    localStorage.setItem(key, (Number(localStorage.getItem(key)) || 0) + 1);

    // 🔒 lock vice president for this voter
    let reg = localStorage.getItem("currentReg");
    localStorage.setItem("viceLocked_" + reg, "true");

    // go to clubs page
    window.location.href = "clubs.html";
    return false;
}
</script>

<script>
// 🔐 prevent illegal access

let reg = localStorage.getItem("currentReg");

// not logged in → back to login
if (!reg) {
    window.location.href = "index.html";
}

// already voted vice president → skip page
if (localStorage.getItem("viceLocked_" + reg)) {
    window.location.href = "clubs.html";
}
</script>

</body>
</html>
