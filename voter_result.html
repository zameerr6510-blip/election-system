<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote Submitted</title>

<style>
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("https://www.mbacollegesbangalore.in/wp-content/uploads/2017/07/Karnataka-College-of-Management-Bangalore-Campus.png")
    no-repeat center/cover;
    opacity:0.25;
    z-index:-1;
}

body{
    font-family:Arial;
    background:#eef;
    text-align:center;
}

.box{
    background:#ecfdf5;
    width:70%;
    margin:30px auto;
    padding:20px;
    border-radius:12px;
}

table{
    margin:auto;
    border-collapse:collapse;
    width:70%;
}

th,td{
    border:1px solid #888;
    padding:10px;
}

th{
    background:#28a745;
    color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>🎉 Congratulations 🎉</h2>
<p>Your vote has been successfully recorded.</p>
</div>

<div class="box">
<h3>Voter Details</h3>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Register No:</b> <span id="reg"></span></p>
</div>

<div class="box">
<h3>Your Selected Candidates</h3>
<table>
<tr><th>Post / Club</th><th>Selected Candidates</th></tr>
<tr><td>President</td><td id="pres"></td></tr>
<tr><td>Vice President</td><td id="vice"></td></tr>
<tr><td>Cultural Club</td><td id="cultural"></td></tr>
<tr><td>Sports Club</td><td id="sports"></td></tr>
<tr><td>Technical Club</td><td id="tech"></td></tr>
<tr><td>NSS Club</td><td id="nss"></td></tr>
</table>
</div>

<script>
let name = localStorage.getItem("currentName") || "-";
let reg = localStorage.getItem("currentReg") || "-";
let president = localStorage.getItem("president") || "-";
let vice = localStorage.getItem("vicePresident") || "-";

document.getElementById("name").innerText = name;
document.getElementById("reg").innerText = reg;
document.getElementById("pres").innerText = president;
document.getElementById("vice").innerText = vice;

function showClub(id, key){
    let data = JSON.parse(localStorage.getItem(key) || "[]");
    document.getElementById(id).innerText =
        data.length ? data.join(" , ") : "-";
    return data.length ? data.join(", ") : "-";
}

let cultural = showClub("cultural","cultural");
let sports = showClub("sports","sports");
let tech = showClub("tech","tech");
let nss = showClub("nss","nss");


// ================================
// 📲 WhatsApp Integration
// ================================

// 👉 PUT YOUR WHATSAPP NUMBER HERE (with country code, no + sign)
let phoneNumber = "918073569852";

let message =
"🗳 *New Vote Submitted* %0A%0A" +
"*Name:* " + name + "%0A" +
"*Register No:* " + reg + "%0A%0A" +
"*President:* " + president + "%0A" +
"*Vice President:* " + vice + "%0A%0A" +
"*Cultural Club:* " + cultural + "%0A" +
"*Sports Club:* " + sports + "%0A" +
"*Technical Club:* " + tech + "%0A" +
"*NSS Club:* " + nss;

let whatsappURL = "https://wa.me/" + phoneNumber + "?text=" + message;

// Open WhatsApp automatically
window.open(whatsappURL, "_blank");
</script>

</body>
</html>
