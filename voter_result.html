<!DOCTYPE html>
<html>
<head>
<title>Vote Submitted</title>

<style>
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("https://www.mbacollegesbangalore.in/wp-content/uploads/2017/07/Karnataka-College-of-Management-Bangalore-Campus.png")
    no-repeat center/cover;
    opacity:0.25;
    z-index:-1;
}

body{
    font-family:Arial;
    background:#eef;
    text-align:center;
}

.box{
    background:#ecfdf5;
    width:70%;
    margin:30px auto;
    padding:20px;
    border-radius:12px;
}

table{
    margin:auto;
    border-collapse:collapse;
    width:70%;
}

th,td{
    border:1px solid #888;
    padding:10px;
}

th{
    background:#28a745;
    color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>🎉 Congratulations 🎉</h2>
<p>Your vote has been successfully recorded.</p>
</div>

<div class="box">
<h3>Voter Details</h3>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Register No:</b> <span id="reg"></span></p>
</div>

<div class="box">
<h3>Your Selected Candidates</h3>
<table>
<tr><th>Post / Club</th><th>Selected Candidates</th></tr>
<tr><td>President</td><td id="pres"></td></tr>
<tr><td>Vice President</td><td id="vice"></td></tr>
<tr><td>Cultural Club</td><td id="cultural"></td></tr>
<tr><td>Sports Club</td><td id="sports"></td></tr>
<tr><td>Technical Club</td><td id="tech"></td></tr>
<tr><td>NSS Club</td><td id="nss"></td></tr>
</table>
</div>

<script>
document.getElementById("name").innerText =
    localStorage.getItem("currentName");

document.getElementById("reg").innerText =
    localStorage.getItem("currentReg");

document.getElementById("pres").innerText =
    localStorage.getItem("president") || "-";

document.getElementById("vice").innerText =
    localStorage.getItem("vicePresident") || "-";

function showClub(id, key){
    let data = JSON.parse(localStorage.getItem(key) || "[]");
    document.getElementById(id).innerText =
        data.length ? data.join(" , ") : "-";
}

showClub("cultural","cultural");
showClub("sports","sports");
showClub("tech","tech");
showClub("nss","nss");
</script>

</body>
</html>
